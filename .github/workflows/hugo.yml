# Build the Hugo site on push and publish to GitHub Pages.
# Requires Pages enabled in repo settings (Source: GitHub Actions).
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.151.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
            && sudo dpkg -i ${{ runner.temp }}/hugo.deb
          hugo version

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PaperMod theme
        run: |
          git clone --depth=1 --branch=v8.0 \
            https://github.com/adityatelange/hugo-PaperMod.git \
            themes/PaperMod

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo (capture output)
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          set +e
          {
            echo "## Diagnostics"
            echo '### hugo version'
            echo '```'
            hugo version
            echo '```'
            echo '### Working dir tree (top level)'
            echo '```'
            ls -la
            echo '```'
            echo '### themes/PaperMod'
            echo '```'
            ls themes/PaperMod | head -30
            echo '```'
            echo '### hugo.toml'
            echo '```toml'
            cat hugo.toml
            echo '```'
            echo '### BASE_URL'
            echo "BASE_URL='${BASE_URL}'"
          } >> "$GITHUB_STEP_SUMMARY"

          hugo \
            --gc \
            --minify \
            --logLevel info \
            --baseURL "${BASE_URL}/" 2>&1 | tee /tmp/hugo.log
          rc=${PIPESTATUS[0]}

          {
            echo "## Hugo build output (exit ${rc})"
            echo '```'
            cat /tmp/hugo.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit $rc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
