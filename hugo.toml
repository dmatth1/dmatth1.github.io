# Hugo configuration for the personal site.
# Serves at https://dmatth1.github.io/.
# Deployed via the workflow in .github/workflows/hugo.yml.
# If you point a custom domain at the repo, change baseURL accordingly.

baseURL = "https://dmatth1.github.io/"
languageCode = "en-us"
title = "dmatth1"
theme = "PaperMod"

# Sensible defaults for an engineer blog.
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true

# PaperMod v8.0 warns about a partial-path quirk on every build; suppress it.
ignoreLogs = ['warning-partial-superfluous-prefix']

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "dmatth1"
  description = "Personal blog."
  author = "dmatth1"
  mainSections = ["posts"]

  defaultTheme = "auto"             # auto | light | dark
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  hideMeta = false

  # PaperMod v8.0's opengraph/twitter_cards templates fall back to the removed
  # `site.Social.*` API when `params.social` is undefined. Define empty values
  # so execution stays in the modern branch.
  [params.social]
    twitter = ""
    facebook_admin = ""

  [params.homeInfoParams]
    Title = "dmatth1"
    Content = "This is my personal blog."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/dmatth1"

  [params.assets]
    disableHLJS = true
    favicon = ""
    favicon16x16 = ""

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "github"
    name = "github"
    url = "https://github.com/dmatth1"
    weight = 40

# PaperMod-specific: enable client-side search via FlexSearch.
[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github-dark"
